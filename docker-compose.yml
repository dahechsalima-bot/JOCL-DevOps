# ================================================
# docker-compose.yml — Lance toute l'application
# 3 services : MySQL + Spring Boot + Angular
# ================================================

version: '3.8'

services:

  # -----------------------------------------------
  # SERVICE 1 : Base de données MySQL
  # -----------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: jocl-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jocldb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - jocl-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # -----------------------------------------------
  # SERVICE 2 : Backend Spring Boot
  # -----------------------------------------------
  backend:
    build:
      context: ./JOCL-BackEnd
      dockerfile: Dockerfile
    container_name: jocl-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/jocldb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - jocl-network

  # -----------------------------------------------
  # SERVICE 3 : Frontend Angular
  # -----------------------------------------------
  frontend:
    build:
      context: ./JOCL-FrontEnd
      dockerfile: Dockerfile
    container_name: jocl-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - jocl-network

# -----------------------------------------------
# Volumes et réseau partagé
# -----------------------------------------------
volumes:
  mysql_data:

networks:
  jocl-network:
    driver: bridge
